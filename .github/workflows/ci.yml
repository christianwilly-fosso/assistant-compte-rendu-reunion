name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Évite que deux runs se télescopent sur la même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal test dependencies
        # Les tests n'utilisent que la stdlib + pytest + python-dotenv.
        # On évite gradio/faster-whisper (lourds et inutiles ici).
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-dotenv

      - name: Run pytest
        run: pytest tests/ -v

  deploy-to-hugging-face:
    name: Mirror to Hugging Face Space
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: cwilly
          HF_SPACE: assistant-compte-rendu-reunion
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Le secret HF_TOKEN n'est pas configuré dans GitHub (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          git push "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            HEAD:main
